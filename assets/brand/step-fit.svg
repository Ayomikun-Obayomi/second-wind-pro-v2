<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sf-bg" x1="280" y1="0" x2="280" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171325"/>
      <stop offset="0.55" stop-color="#100E18"/>
      <stop offset="1" stop-color="#0A0810"/>
    </linearGradient>
    <radialGradient id="sf-spot" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 120) rotate(90) scale(150)">
      <stop stop-color="#C4B5FD" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sf-glass" x1="280" y1="88" x2="280" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.13)"/>
