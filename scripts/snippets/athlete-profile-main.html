<main id="main" class="athlete-profile-page">

  <article class="athlete-magazine" id="athlete-profile" hidden>
    <header class="athlete-magazine-masthead">
      <nav class="athlete-magazine-breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><span class="athlete-magazine-breadcrumb-label">Roster</span></li>
          <li><a href="meet-the-athletes.html">Meet the Athletes</a></li>
          <li aria-current="page"><span id="athlete-magazine-breadcrumb-name">Athlete</span></li>
        </ol>
      </nav>
    </header>

    <div class="athlete-magazine-hero">
      <div class="athlete-magazine-hero-grid">
        <div class="athlete-magazine-hero-main">
        <div class="athlete-magazine-visual">
          <div class="athlete-magazine-photo" id="athlete-magazine-photo" aria-hidden="true"></div>
        </div>
        <div class="athlete-magazine-intro">
          <h1 class="athlete-magazine-name" id="athlete-magazine-name"></h1>
          <p class="athlete-magazine-position" id="athlete-magazine-position"></p>
          <p class="athlete-magazine-lead" id="athlete-magazine-lead"></p>
          <nav class="athlete-magazine-social" id="athlete-magazine-social" aria-label="Social media" hidden></nav>
        </div>
        </div>
      </div>
    </div>

    <div class="athlete-magazine-body">
      <div class="athlete-magazine-columns">
        <div class="athlete-magazine-story">
          <div class="athlete-magazine-copy" id="athlete-magazine-copy"></div>
          <div class="athlete-magazine-highlights" id="athlete-magazine-highlights" hidden></div>
        </div>
        <aside class="athlete-magazine-sidebar" aria-label="Athlete details">
          <div class="athlete-magazine-statboard" id="athlete-magazine-stats"></div>
          <dl class="athlete-magazine-meta" id="athlete-magazine-meta"></dl>
          <div class="athlete-magazine-agent">
            <span class="athlete-magazine-agent-label">Represented by</span>
            <div id="athlete-magazine-agent"></div>
          </div>
          <a href="get-started?interest=brand" class="btn-outline btn-primary athlete-magazine-cta">
            <span class="btn-label">Partner with this athlete</span>
            <svg class="arrow" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M2 12L12 2M5 2h7v7"/></svg>
          </a>
        </aside>
      </div>
    </div>

    <nav class="athlete-magazine-pager" id="athlete-magazine-pager" aria-label="More athletes" hidden>
      <div class="athlete-magazine-pager-inner">
      <a class="athlete-magazine-pager-link athlete-magazine-pager-link--prev" data-pager="prev" href="#" hidden>
        <span class="athlete-magazine-pager-label">
          <svg class="athlete-magazine-pager-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2L3 6.5L8 11"/></svg>
          Previous
        </span>
        <span class="athlete-magazine-pager-name" data-pager-name></span>
        <span class="athlete-magazine-pager-meta" data-pager-meta></span>
      </a>
      <a class="athlete-magazine-pager-link athlete-magazine-pager-link--next" data-pager="next" href="#" hidden>
        <span class="athlete-magazine-pager-label">
          Next
          <svg class="athlete-magazine-pager-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 2l5 4.5L4 11"/></svg>
        </span>
        <span class="athlete-magazine-pager-name" data-pager-name></span>
        <span class="athlete-magazine-pager-meta" data-pager-meta></span>
      </a>
      </div>
    </nav>
  </article>

  <section class="athlete-magazine-empty" id="athlete-profile-empty" hidden>
    <h1>Athlete not found</h1>
    <p>We couldn’t find that profile. Browse the full roster to explore represented talent.</p>
    <a href="meet-the-athletes.html" class="btn-outline">Meet the Athletes</a>
  </section>

</main>
